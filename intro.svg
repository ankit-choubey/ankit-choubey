<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 120" width="860" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&amp;display=swap');
      .bg { fill: #050508; }
      .line1 { fill: #c40000; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700;
        animation: fadeSlide 0.6s ease forwards; opacity: 0; animation-delay: 0.1s; }
      .line2 { fill: #ff4444; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700;
        animation: fadeSlide 0.6s ease forwards; opacity: 0; animation-delay: 0.4s; }
      .line3 { fill: #ffffff; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700;
        animation: fadeSlide 0.6s ease forwards; opacity: 0; animation-delay: 0.7s; }
      .line4 { fill: #888888; font-family: 'JetBrains Mono', monospace; font-size: 11px;
        animation: fadeSlide 0.6s ease forwards; opacity: 0; animation-delay: 1.0s; }
      .cursor {
        fill: #c40000;
        animation: blink 1s step-end infinite;
      }
      .scanline {
        fill: none;
        stroke: rgba(196,0,0,0.08);
        stroke-width: 1;
        animation: scan 4s linear infinite;
      }
      @keyframes fadeSlide {
        from { opacity: 0; transform: translateX(-8px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
      @keyframes scan {
        0%   { transform: translateY(-120px); }
        100% { transform: translateY(240px); }
      }
    </style>
  </defs>
  <!-- background -->
  <rect class="bg" width="860" height="120" rx="8"/>
  <!-- left red bar accent -->
  <rect x="0" y="0" width="3" height="120" fill="#c40000" rx="2"/>
  <!-- scan line overlay -->
  <line class="scanline" x1="0" y1="0" x2="860" y2="0"/>
  <!-- content lines -->
  <text class="line1" x="20" y="28">  ██████╗ ██████╗ ██████╗ ███████╗    ██╗  ██╗ █████╗ ███████╗██╗  ██╗██╗██████╗  █████╗ </text>
  <text class="line2" x="20" y="52">  &gt;_ ANKIT CHOUBEY  ·  AI/ML Engineer  ·  Agentic AI &amp; LLM Systems  ·  SRM University AP</text>
  <text class="line3" x="20" y="76">  $ whoami → Builder of intelligent systems  ·  3× Hackathon Winner  ·  AI Safety Researcher</text>
  <text class="line4" x="20" y="100">  Aegis-Forge  ·  TriNetra  ·  SurakshaMesh  ·  DharmaShield  ·  EDITH  ·  ExportEase</text>
  <!-- blinking cursor -->
  <rect class="cursor" x="20" y="106" width="8" height="2" rx="1"/>
</svg>
