<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#151515;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0A0A;stop-opacity:1" />
    </linearGradient>
    <!-- Amber glow -->
    <radialGradient id="amberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D97706;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:0" />
    </radialGradient>
    <!-- Red glow -->
    <radialGradient id="redGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#991B1B;stop-opacity:0.14" />
      <stop offset="100%" style="stop-color:#991B1B;stop-opacity:0" />
    </radialGradient>
    <!-- Core glow filter -->
    <filter id="coreGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Circuit trace mask -->
    <clipPath id="heroBound">
      <rect width="1200" height="340"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bgGrad)"/>

  <!-- Ambient glows -->
  <ellipse cx="600" cy="170" rx="360" ry="180" fill="url(#amberGlow)"/>
  <ellipse cx="600" cy="170" rx="240" ry="120" fill="url(#redGlow)"/>

  <!-- Circuit traces background -->
  <g clip-path="url(#heroBound)" opacity="0.13" stroke="#D97706" stroke-width="0.8" fill="none">
    <line x1="0" y1="60" x2="300" y2="60"/>
    <line x1="300" y1="60" x2="320" y2="80"/>
    <line x1="320" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="280" x2="200" y2="280"/>
    <line x1="200" y1="280" x2="220" y2="260"/>
    <line x1="220" y1="260" x2="380" y2="260"/>
    <line x1="900" y1="60" x2="1200" y2="60"/>
    <line x1="820" y1="80" x2="900" y2="60"/>
    <line x1="750" y1="80" x2="820" y2="80"/>
    <line x1="900" y1="280" x2="1200" y2="280"/>
    <line x1="820" y1="260" x2="900" y2="280"/>
    <line x1="750" y1="260" x2="820" y2="260"/>
    <line x1="100" y1="0" x2="100" y2="100"/>
    <line x1="1100" y1="0" x2="1100" y2="100"/>
    <line x1="100" y1="240" x2="100" y2="340"/>
    <line x1="1100" y1="240" x2="1100" y2="340"/>
    <circle cx="300" cy="60" r="3" fill="#D97706"/>
    <circle cx="200" cy="280" r="3" fill="#D97706"/>
    <circle cx="900" cy="60" r="3" fill="#D97706"/>
    <circle cx="900" cy="280" r="3" fill="#D97706"/>
  </g>

  <!-- Particles -->
  <g opacity="0.5">
    <circle cx="80" cy="90" r="1.5" fill="#D97706"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="200" r="1" fill="#FBBF24"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="240" cy="130" r="1.5" fill="#D97706"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="100" r="1.5" fill="#991B1B"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="1130" cy="230" r="1" fill="#D97706"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="4.8s" repeatCount="indefinite"/></circle>
    <circle cx="960" cy="160" r="1.5" fill="#FBBF24"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="50" cy="300" r="1" fill="#991B1B"><animate attributeName="opacity" values="0.4;1;0.4" dur="5.1s" repeatCount="indefinite"/></circle>
    <circle cx="1180" cy="50" r="1" fill="#D97706"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.9s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ═══════════════════ LEFT — Identity ═══════════════════ -->
  <g transform="translate(60, 90)">
    <!-- Name -->
    <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700" fill="#F8FAFC" letter-spacing="3" filter="url(#softGlow)">
      ANKIT CHOUBEY
    </text>
    <!-- Tagline -->
    <text x="2" y="34" font-family="JetBrains Mono, monospace" font-size="13" font-weight="400" fill="#D97706" letter-spacing="1">
      Building Autonomous Intelligence
    </text>
    <!-- Separator -->
    <line x1="0" y1="50" x2="280" y2="50" stroke="#D97706" stroke-width="0.8" opacity="0.5"/>
    <!-- Subtitle tags -->
    <text x="0" y="70" font-family="JetBrains Mono, monospace" font-size="10" fill="#94A3B8" letter-spacing="0.5">
      Agentic AI
    </text>
    <text x="80" y="70" font-family="JetBrains Mono, monospace" font-size="10" fill="#94A3B8" letter-spacing="0.5">·</text>
    <text x="92" y="70" font-family="JetBrains Mono, monospace" font-size="10" fill="#94A3B8" letter-spacing="0.5">
      LLM Engineering
    </text>
    <text x="0" y="88" font-family="JetBrains Mono, monospace" font-size="10" fill="#94A3B8" letter-spacing="0.5">
      Backend Systems
    </text>
    <text x="100" y="88" font-family="JetBrains Mono, monospace" font-size="10" fill="#94A3B8" letter-spacing="0.5">·</text>
    <text x="112" y="88" font-family="JetBrains Mono, monospace" font-size="10" fill="#94A3B8" letter-spacing="0.5">
      Intelligent Systems
    </text>
    <!-- Institution -->
    <text x="0" y="115" font-family="JetBrains Mono, monospace" font-size="10" fill="#FBBF24" letter-spacing="0.5">
      B.Tech CSE · SRM University AP · 3rd Year
    </text>
  </g>

  <!-- ═══════════════════ CENTER — AI Core ═══════════════════ -->
  <g transform="translate(600, 170)" filter="url(#coreGlow)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="#D97706" stroke-width="0.7" opacity="0.25" stroke-dasharray="8 4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="28s" repeatCount="indefinite"/>
    </circle>
    <!-- Ring 2 -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#991B1B" stroke-width="0.7" opacity="0.3" stroke-dasharray="5 6">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="18s" repeatCount="indefinite"/>
    </circle>
    <!-- Ring 3 -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="#FBBF24" stroke-width="0.8" opacity="0.22" stroke-dasharray="3 8">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
    </circle>
    <!-- Core circle -->
    <circle cx="0" cy="0" r="34" fill="#151515" stroke="#D97706" stroke-width="1.2" opacity="0.9"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#D97706" stroke-width="0.5" opacity="0.4"/>
    <!-- Core pulse -->
    <circle cx="0" cy="0" r="16" fill="#D97706" opacity="0.12">
      <animate attributeName="r" values="16;22;16" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.12;0.22;0.12" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Core symbol -->
    <text x="0" y="6" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700" fill="#D97706" text-anchor="middle" letter-spacing="1">AI</text>
    <!-- Circuit spokes -->
    <g stroke="#D97706" stroke-width="0.6" opacity="0.3">
      <line x1="0" y1="-90" x2="0" y2="-52"/>
      <line x1="0" y1="52" x2="0" y2="90"/>
      <line x1="-90" y1="0" x2="-52" y2="0"/>
      <line x1="52" y1="0" x2="90" y2="0"/>
      <line x1="-64" y1="-64" x2="-37" y2="-37"/>
      <line x1="37" y1="37" x2="64" y2="64"/>
      <line x1="64" y1="-64" x2="37" y2="-37"/>
      <line x1="-37" y1="37" x2="-64" y2="64"/>
    </g>
    <!-- Spoke endpoints -->
    <g fill="#FBBF24" opacity="0.6">
      <circle cx="0" cy="-90" r="2"/>
      <circle cx="0" cy="90" r="2"/>
      <circle cx="-90" cy="0" r="2"/>
      <circle cx="90" cy="0" r="2"/>
    </g>
    <!-- Theme label -->
    <text x="0" y="112" font-family="JetBrains Mono, monospace" font-size="9" fill="#94A3B8" text-anchor="middle" letter-spacing="3" opacity="0.7">IGNIS</text>
  </g>

  <!-- ═══════════════════ RIGHT — Terminal ═══════════════════ -->
  <g transform="translate(840, 80)">
    <!-- Terminal window frame -->
    <rect x="0" y="0" width="300" height="180" rx="6" fill="#151515" stroke="#D97706" stroke-width="0.8" opacity="0.95"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="300" height="24" rx="6" fill="#1E1E1E"/>
    <rect x="0" y="16" width="300" height="8" fill="#1E1E1E"/>
    <!-- Traffic lights -->
    <circle cx="14" cy="12" r="4" fill="#991B1B"/>
    <circle cx="26" cy="12" r="4" fill="#D97706"/>
    <circle cx="38" cy="12" r="4" fill="#22C55E" opacity="0.7"/>
    <!-- Terminal label -->
    <text x="150" y="16" font-family="JetBrains Mono, monospace" font-size="9" fill="#94A3B8" text-anchor="middle">ignis — terminal</text>
    <!-- Terminal content -->
    <text x="14" y="46" font-family="JetBrains Mono, monospace" font-size="10" fill="#D97706">$ boot ignis</text>
    <text x="14" y="66" font-family="JetBrains Mono, monospace" font-size="10" fill="#94A3B8">
      <tspan fill="#FBBF24">▶</tspan> Initializing AI Core...
    </text>
    <text x="14" y="84" font-family="JetBrains Mono, monospace" font-size="10" fill="#94A3B8">
      <tspan fill="#FBBF24">▶</tspan> Loading Agentic Modules...
    </text>
    <text x="14" y="102" font-family="JetBrains Mono, monospace" font-size="10" fill="#94A3B8">
      <tspan fill="#FBBF24">▶</tspan> Synchronizing Memory...
    </text>
    <text x="14" y="120" font-family="JetBrains Mono, monospace" font-size="10" fill="#94A3B8">
      <tspan fill="#FBBF24">▶</tspan> Calibrating RAG Pipelines...
    </text>
    <text x="14" y="138" font-family="JetBrains Mono, monospace" font-size="10" fill="#22C55E" font-weight="700">
      ✓ System Ready.
    </text>
    <!-- Cursor blink -->
    <rect x="14" y="150" width="7" height="12" fill="#D97706">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
