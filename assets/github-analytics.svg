<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070608"/>
      <stop offset="50%" stop-color="#111014"/>
      <stop offset="100%" stop-color="#070608"/>
    </linearGradient>
    <linearGradient id="ember" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c94d1e"/>
      <stop offset="50%" stop-color="#d69c0b"/>
      <stop offset="100%" stop-color="#7a0d1d"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 30px; font-weight: 700; fill: #f8fafc; letter-spacing: 4px; }
      .subtitle { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 13px; fill: #d69c0b; letter-spacing: 2px; }
      .card { fill: rgba(255,255,255,0.05); stroke: rgba(214,156,11,0.24); stroke-width: 1; }
      .label { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 12px; fill: #cbd5e1; letter-spacing: 1px; }
      .value { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 18px; fill: #f8fafc; font-weight: 700; }
      .mini { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 11px; fill: #94a3b8; }
      .bar { transform-origin: 0 0; animation: fill 1.6s cubic-bezier(.16,1,.3,1) forwards; }
      .draw { stroke-dasharray: 600; stroke-dashoffset: 600; animation: draw 1.8s ease forwards; }
      .pulse { animation: pulse 3s ease-in-out infinite; }
      @keyframes fill { from { transform: scaleX(0); } to { transform: scaleX(1); } }
      @keyframes draw { to { stroke-dashoffset: 0; } }
      @keyframes pulse { 0%,100% { opacity: .45; } 50% { opacity: 1; } }
    </style>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <rect x="0" y="0" width="4" height="760" fill="url(#ember)"/>
  <text class="title" x="34" y="48">GITHUB ANALYTICS // SHIP STATUS</text>
  <text class="subtitle" x="34" y="76">self-contained dashboard for profile stats, trophies, and language mix</text>

  <g transform="translate(34, 104)">
    <rect class="card" x="0" y="0" width="276" height="154" rx="18"/>
    <text class="label" x="20" y="30">stats-card</text>
    <text class="value" x="20" y="64">Active Builder</text>
    <text class="mini" x="20" y="94">Projects shipped · research active</text>
    <rect x="20" y="112" width="236" height="10" rx="5" fill="rgba(255,255,255,0.06)"/>
    <rect class="bar" x="20" y="112" width="200" height="10" rx="5" fill="url(#ember)"/>
  </g>

  <g transform="translate(324, 104)">
    <rect class="card" x="0" y="0" width="276" height="154" rx="18"/>
    <text class="label" x="20" y="30">top-langs</text>
    <text class="value" x="20" y="64">Python / JS</text>
    <text class="mini" x="20" y="94">AI systems, backend, automation</text>
    <rect x="20" y="112" width="236" height="10" rx="5" fill="rgba(255,255,255,0.06)"/>
    <rect class="bar" x="20" y="112" width="178" height="10" rx="5" fill="#d69c0b" style="animation-delay:0.1s;"/>
  </g>

  <g transform="translate(614, 104)">
    <rect class="card" x="0" y="0" width="276" height="154" rx="18"/>
    <text class="label" x="20" y="30">trophies</text>
    <text class="value" x="20" y="64">National Wins</text>
    <text class="mini" x="20" y="94">Hackathons · competitions · finals</text>
    <circle cx="214" cy="62" r="26" fill="rgba(214,156,11,0.15)" stroke="#d69c0b" stroke-opacity="0.35"/>
    <path class="draw" d="M202 60h24M214 48v24M206 52l16 16M222 52l-16 16" stroke="#f8fafc" stroke-width="2" stroke-linecap="round"/>
  </g>

  <g transform="translate(904, 104)">
    <rect class="card" x="0" y="0" width="262" height="154" rx="18"/>
    <text class="label" x="20" y="30">profile-details</text>
    <text class="value" x="20" y="64">SRM AP · 3rd Year</text>
    <text class="mini" x="20" y="94">AI/ML, agentic systems, research</text>
    <rect x="20" y="112" width="222" height="10" rx="5" fill="rgba(255,255,255,0.06)"/>
    <rect class="bar" x="20" y="112" width="188" height="10" rx="5" fill="#7a0d1d" style="animation-delay:0.2s;"/>
  </g>

  <g transform="translate(34, 282)">
    <rect class="card" x="0" y="0" width="560" height="204" rx="18"/>
    <text class="label" x="20" y="30">repos-per-language</text>
    <text class="mini" x="20" y="58">distribution snapshot</text>
    <rect x="20" y="84" width="520" height="16" rx="8" fill="rgba(255,255,255,0.06)"/>
    <rect class="bar" x="20" y="84" width="268" height="16" rx="8" fill="url(#ember)" style="animation-delay:0.2s;"/>
    <rect x="20" y="116" width="520" height="16" rx="8" fill="rgba(255,255,255,0.06)"/>
    <rect class="bar" x="20" y="116" width="118" height="16" rx="8" fill="#d69c0b" style="animation-delay:0.3s;"/>
    <rect x="20" y="148" width="520" height="16" rx="8" fill="rgba(255,255,255,0.06)"/>
    <rect class="bar" x="20" y="148" width="90" height="16" rx="8" fill="#7a0d1d" style="animation-delay:0.4s;"/>
    <text class="label" x="430" y="98">Python</text>
    <text class="label" x="430" y="130">JavaScript</text>
    <text class="label" x="430" y="162">SQL</text>
  </g>

  <g transform="translate(620, 282)">
    <rect class="card" x="0" y="0" width="260" height="204" rx="18"/>
    <text class="label" x="20" y="30">trophies</text>
    <text class="mini" x="20" y="58">recognition board</text>
    <circle cx="58" cy="116" r="22" fill="rgba(214,156,11,0.16)" stroke="#d69c0b" stroke-opacity="0.35"/>
    <circle cx="128" cy="116" r="22" fill="rgba(121,13,29,0.16)" stroke="#7a0d1d" stroke-opacity="0.35"/>
    <circle cx="198" cy="116" r="22" fill="rgba(201,77,30,0.16)" stroke="#c94d1e" stroke-opacity="0.35"/>
    <text class="value" x="58" y="122" text-anchor="middle" style="font-size:14px;">1%</text>
    <text class="value" x="128" y="122" text-anchor="middle" style="font-size:14px;">Top</text>
    <text class="value" x="198" y="122" text-anchor="middle" style="font-size:14px;">Win</text>
  </g>

  <g transform="translate(904, 282)">
    <rect class="card" x="0" y="0" width="262" height="204" rx="18"/>
    <text class="label" x="20" y="30">productive-time</text>
    <text class="mini" x="20" y="58">highest output windows</text>
    <rect x="20" y="86" width="48" height="72" rx="6" fill="rgba(255,255,255,0.06)"/>
    <rect x="78" y="64" width="48" height="94" rx="6" fill="rgba(255,255,255,0.06)"/>
    <rect x="136" y="48" width="48" height="110" rx="6" fill="rgba(255,255,255,0.06)"/>
    <rect x="194" y="78" width="48" height="80" rx="6" fill="rgba(255,255,255,0.06)"/>
    <rect class="bar" x="20" y="112" width="48" height="46" rx="6" fill="#7a0d1d" style="animation-delay:0.15s;"/>
    <rect class="bar" x="78" y="90" width="48" height="68" rx="6" fill="#c94d1e" style="animation-delay:0.25s;"/>
    <rect class="bar" x="136" y="68" width="48" height="90" rx="6" fill="#d69c0b" style="animation-delay:0.35s;"/>
    <rect class="bar" x="194" y="96" width="48" height="62" rx="6" fill="#c94d1e" style="animation-delay:0.45s;"/>
  </g>

  <g transform="translate(34, 516)">
    <rect class="card" x="0" y="0" width="1132" height="188" rx="18"/>
    <text class="label" x="20" y="30">activity-graph</text>
    <path d="M20 150 C120 120, 190 90, 270 110 S420 170, 520 120 S720 50, 840 88 S1000 150, 1110 76" fill="none" stroke="url(#ember)" stroke-width="3" class="draw"/>
    <g fill="#d69c0b" opacity="0.7">
      <circle class="pulse" cx="270" cy="110" r="4"/>
      <circle class="pulse" cx="520" cy="120" r="4" style="animation-delay:-1s;"/>
      <circle class="pulse" cx="840" cy="88" r="4" style="animation-delay:-2s;"/>
      <circle class="pulse" cx="1110" cy="76" r="4" style="animation-delay:-3s;"/>
    </g>
    <text class="mini" x="20" y="176">steady output, research sprints, hackathon arcs, and build momentum</text>
  </g>
</svg>