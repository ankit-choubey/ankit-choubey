<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 100" width="1200" height="100">
  <defs>
    <linearGradient id="footGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0A0A0A;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#151515;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#151515;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0A0A0A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="topBorderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0A0A0A;stop-opacity:1"/>
      <stop offset="20%" style="stop-color:#D97706;stop-opacity:0.5"/>
      <stop offset="50%" style="stop-color:#FBBF24;stop-opacity:0.9"/>
      <stop offset="80%" style="stop-color:#991B1B;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#0A0A0A;stop-opacity:1"/>
    </linearGradient>
    <filter id="footGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="100" fill="url(#footGrad)"/>
  <!-- Top border line -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="url(#topBorderGrad)" stroke-width="1" filter="url(#footGlow)"/>
  <!-- Terminal shutdown line -->
  <text x="600" y="38" font-family="JetBrains Mono, monospace" font-size="11" fill="#D97706" text-anchor="middle" letter-spacing="1" opacity="0.9">$ shutdown</text>
  <!-- Status -->
  <text x="600" y="58" font-family="JetBrains Mono, monospace" font-size="10" fill="#94A3B8" text-anchor="middle" letter-spacing="1">
    Mission Status : <tspan fill="#22C55E" font-weight="700">ACTIVE</tspan>
  </text>
  <!-- Next build -->
  <text x="600" y="76" font-family="JetBrains Mono, monospace" font-size="10" fill="#94A3B8" text-anchor="middle" letter-spacing="1">
    Next Build : <tspan fill="#FBBF24">Loading...</tspan>
  </text>
  <!-- Blink cursor -->
  <rect x="718" y="66" width="6" height="10" fill="#D97706">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Flanking decorations -->
  <line x1="100" y1="55" x2="380" y2="55" stroke="#D97706" stroke-width="0.4" opacity="0.2"/>
  <line x1="820" y1="55" x2="1100" y2="55" stroke="#991B1B" stroke-width="0.4" opacity="0.2"/>
  <circle cx="100" cy="55" r="2" fill="#D97706" opacity="0.4"/>
  <circle cx="1100" cy="55" r="2" fill="#991B1B" opacity="0.4"/>
</svg>
