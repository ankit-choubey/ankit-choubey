<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08060a"/>
      <stop offset="45%" stop-color="#111014"/>
      <stop offset="100%" stop-color="#08060a"/>
    </linearGradient>
    <linearGradient id="ember" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c94d1e"/>
      <stop offset="50%" stop-color="#d69c0b"/>
      <stop offset="100%" stop-color="#7a0d1d"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 30px; font-weight: 700; fill: #f8fafc; letter-spacing: 4px; }
      .subtitle { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 13px; fill: #d69c0b; letter-spacing: 2px; }
      .section { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 15px; fill: #f8fafc; letter-spacing: 1px; }
      .label { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 12px; fill: #cbd5e1; }
      .chip { fill: rgba(255,255,255,0.06); stroke: rgba(214,156,11,0.26); stroke-width: 1; }
      .bar { rx: 4; ry: 4; transform-origin: 0 0; animation: fill 1.8s cubic-bezier(.16,1,.3,1) forwards; }
      .scan { animation: drift 7s linear infinite; }
      .pulse { animation: pulse 3s ease-in-out infinite; }
      @keyframes fill { from { transform: scaleX(0); } to { transform: scaleX(1); } }
      @keyframes pulse { 0%,100% { opacity: .45; } 50% { opacity: 1; } }
      @keyframes drift { from { transform: translateY(-40px); } to { transform: translateY(420px); } }
    </style>
  </defs>

  <rect width="1200" height="380" fill="url(#bg)"/>
  <rect x="0" y="0" width="4" height="380" fill="url(#ember)"/>
  <line class="scan" x1="0" y1="0" x2="1200" y2="0" stroke="#f59e0b" stroke-opacity="0.08" stroke-width="2"/>

  <text class="title" x="34" y="48">TECH STACK // IGNITION MATRIX</text>
  <text class="subtitle" x="34" y="76">shounen-inspired build arsenal · tools that actually ship</text>

  <g transform="translate(34, 110)">
    <rect class="chip" x="0" y="0" width="330" height="220" rx="18"/>
    <text class="section" x="18" y="30">Languages</text>
    <text class="label" x="18" y="60">Python · C++ · JavaScript · SQL · Bash</text>
    <rect x="18" y="78" width="280" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
    <rect class="bar" x="18" y="78" width="260" height="8" fill="url(#ember)" style="animation-delay: 0.08s;"/>
    <text class="label" x="18" y="118">AI / ML</text>
    <text class="label" x="18" y="142">PyTorch · TensorFlow · LangChain · LangGraph · RAG · SHAP</text>
    <rect x="18" y="160" width="280" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
    <rect class="bar" x="18" y="160" width="248" height="8" fill="#c94d1e" style="animation-delay: 0.16s;"/>
  </g>

  <g transform="translate(388, 110)">
    <rect class="chip" x="0" y="0" width="370" height="220" rx="18"/>
    <text class="section" x="18" y="30">Backend / Data</text>
    <text class="label" x="18" y="60">FastAPI · Node.js · PostgreSQL · MongoDB · Redis · Supabase</text>
    <rect x="18" y="78" width="312" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
    <rect class="bar" x="18" y="78" width="286" height="8" fill="#d69c0b" style="animation-delay: 0.22s;"/>
    <text class="label" x="18" y="118">DevOps / Infra</text>
    <text class="label" x="18" y="142">Docker · Git · Linux · GitHub Actions · VS Code</text>
    <rect x="18" y="160" width="312" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
    <rect class="bar" x="18" y="160" width="240" height="8" fill="#7a0d1d" style="animation-delay: 0.32s;"/>
  </g>

  <g transform="translate(788, 110)">
    <rect class="chip" x="0" y="0" width="378" height="220" rx="18"/>
    <text class="section" x="18" y="30">Build Style</text>
    <text class="label" x="18" y="60">Agentic systems · multi-agent orchestration · explainable AI · research-to-product</text>
    <circle cx="90" cy="132" r="48" fill="rgba(214,156,11,0.08)" stroke="#d69c0b" stroke-opacity="0.35"/>
    <circle cx="90" cy="132" r="28" fill="rgba(121,13,29,0.18)" stroke="#c94d1e" stroke-opacity="0.4"/>
    <text x="90" y="138" text-anchor="middle" class="section" style="font-size:18px;">AI</text>
    <g transform="translate(168, 92)">
      <rect x="0" y="0" width="170" height="22" rx="11" fill="rgba(255,255,255,0.06)"/>
      <rect class="bar" x="0" y="0" width="150" height="22" rx="11" fill="url(#ember)" style="animation-delay: 0.42s;"/>
      <text x="14" y="15" class="label" fill="#0a0a0a">Reasoning</text>
      <rect x="0" y="34" width="170" height="22" rx="11" fill="rgba(255,255,255,0.06)"/>
      <rect class="bar" x="0" y="34" width="138" height="22" rx="11" fill="#d69c0b" style="animation-delay: 0.52s;"/>
      <text x="14" y="49" class="label" fill="#0a0a0a">Shipping</text>
      <rect x="0" y="68" width="170" height="22" rx="11" fill="rgba(255,255,255,0.06)"/>
      <rect class="bar" x="0" y="68" width="146" height="22" rx="11" fill="#7a0d1d" style="animation-delay: 0.62s;"/>
      <text x="14" y="83" class="label" fill="#f8fafc">Impact</text>
    </g>
  </g>

  <circle class="pulse" cx="1035" cy="48" r="3.2" fill="#d69c0b"/>
  <circle class="pulse" cx="1070" cy="58" r="2.2" fill="#c94d1e" style="animation-delay:-1s;"/>
  <circle class="pulse" cx="1104" cy="74" r="1.8" fill="#f8fafc" style="animation-delay:-2s;"/>
</svg>