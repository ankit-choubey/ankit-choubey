<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060509"/>
      <stop offset="50%" stop-color="#111014"/>
      <stop offset="100%" stop-color="#060509"/>
    </linearGradient>
    <linearGradient id="ember" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c94d1e"/>
      <stop offset="50%" stop-color="#d69c0b"/>
      <stop offset="100%" stop-color="#7a0d1d"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 30px; font-weight: 700; fill: #f8fafc; letter-spacing: 4px; }
      .subtitle { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 13px; fill: #d69c0b; letter-spacing: 2px; }
      .card { fill: rgba(255,255,255,0.05); stroke: rgba(214,156,11,0.25); stroke-width: 1; }
      .label { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 12px; fill: #cbd5e1; letter-spacing: 1px; }
      .value { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 20px; fill: #f8fafc; font-weight: 700; }
      .bar { transform-origin: 0 0; animation: fill 1.6s cubic-bezier(.16,1,.3,1) forwards; }
      .pulse { animation: pulse 3s ease-in-out infinite; }
      .rise { animation: rise 1.1s cubic-bezier(.16,1,.3,1) forwards; }
      @keyframes fill { from { transform: scaleX(0); } to { transform: scaleX(1); } }
      @keyframes pulse { 0%,100% { opacity: .45; } 50% { opacity: 1; } }
      @keyframes rise { from { transform: translateY(14px); } to { transform: translateY(0); } }
    </style>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect x="0" y="0" width="4" height="320" fill="url(#ember)"/>
  <text class="title" x="34" y="48">BATTLE RECORD // VICTORY TABLE</text>
  <text class="subtitle" x="34" y="76">animated summary of wins, finalists, systems, and research output</text>

  <g transform="translate(34, 104)">
    <rect class="card rise" x="0" y="0" width="274" height="170" rx="18" style="animation-delay:0.08s;" opacity="1"/>
    <text class="label" x="20" y="32">Competition Wins</text>
    <text class="value" x="20" y="66">5×</text>
    <text class="label" x="20" y="96">National and university wins</text>
    <rect x="20" y="122" width="234" height="10" rx="5" fill="rgba(255,255,255,0.06)"/>
    <rect class="bar" x="20" y="122" width="192" height="10" rx="5" fill="url(#ember)"/>
  </g>

  <g transform="translate(324, 104)">
    <rect class="card rise" x="0" y="0" width="274" height="170" rx="18" style="animation-delay:0.16s;" opacity="1"/>
    <text class="label" x="20" y="32">National Finalists</text>
    <text class="value" x="20" y="66">6×</text>
    <text class="label" x="20" y="96">Repeated validation in finals</text>
    <rect x="20" y="122" width="234" height="10" rx="5" fill="rgba(255,255,255,0.06)"/>
    <rect class="bar" x="20" y="122" width="206" height="10" rx="5" fill="#d69c0b" style="animation-delay:0.1s;"/>
  </g>

  <g transform="translate(614, 104)">
    <rect class="card rise" x="0" y="0" width="274" height="170" rx="18" style="animation-delay:0.24s;" opacity="1"/>
    <text class="label" x="20" y="32">Prize Value</text>
    <text class="value" x="20" y="66">~$2,304</text>
    <text class="label" x="20" y="96">Approximate cumulative winnings</text>
    <rect x="20" y="122" width="234" height="10" rx="5" fill="rgba(255,255,255,0.06)"/>
    <rect class="bar" x="20" y="122" width="180" height="10" rx="5" fill="#7a0d1d" style="animation-delay:0.18s;"/>
  </g>

  <g transform="translate(904, 104)">
    <rect class="card rise" x="0" y="0" width="262" height="170" rx="18" style="animation-delay:0.32s;" opacity="1"/>
    <text class="label" x="20" y="32">AI Systems Built</text>
    <text class="value" x="20" y="66">6+</text>
    <text class="label" x="20" y="96">Agentic, RAG, and backend systems</text>
    <rect x="20" y="122" width="222" height="10" rx="5" fill="rgba(255,255,255,0.06)"/>
    <rect class="bar" x="20" y="122" width="196" height="10" rx="5" fill="url(#ember)" style="animation-delay:0.24s;"/>
  </g>

  <g filter="url(#glow)">
    <circle class="pulse" cx="1080" cy="38" r="3.2" fill="#d69c0b"/>
    <circle class="pulse" cx="1110" cy="52" r="2.4" fill="#c94d1e" style="animation-delay:-1s;"/>
    <circle class="pulse" cx="1140" cy="70" r="1.8" fill="#f8fafc" style="animation-delay:-2s;"/>
  </g>
</svg>